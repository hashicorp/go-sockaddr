name: Build and Test Workflow

on:
    pull_request:
        branches: [ "master" ]
    push:
        branches: [ "master" ]

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          max-parallel: 30
          matrix:
            version:
              - 'oldstable'
              - 'stable'
        steps:
            - name: Checkout Code
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - name: Setup Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                go-version: ${{ matrix.version }}
            - name: Test Go
              run: go test -v -race -coverprofile=coverage.out ./...
            - name: Upload coverage report
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              with: 
                path: coverage.out
                name: coverage-report-${{matrix.version}}
            - name: Display coverage report
              run: go tool cover -func=coverage.out
    lint:
      name: Lint for target ${{ matrix.target }}
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        max-parallel: 30
        matrix:
          target: [linux-amd64, windows-amd64, darwin-arm64, aix-ppc64, solaris-amd64]
      steps:
          - name: Checkout Code
            uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          - name: Setup Go
            uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
            with:
              go-version: 'stable'
          - name: Set target platform
            run: | 
              {
                echo "GOOS=$(echo ${{ matrix.target }} | cut -d - -f1)" 
                echo "GOARCH=$(echo ${{ matrix.target }} | cut -d - -f2)"
              } >> "$GITHUB_ENV"
          - name: Run Linter
            uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
