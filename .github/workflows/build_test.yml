name: Build and Test Workflow

on:
    pull_request:
        branches: [ "master" ]

jobs:
    build:
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          max-parallel: 30
          matrix:
            version:
              - 'oldstable'
              - 'stable'
        steps:
            - name: Checkout Code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - name: Setup Go
              uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
              with:
                go-version: ${{ matrix.version }}
            - name: Test Go
              run: go test -v -coverprofile=coverage.out ./...
            - name: Upload coverage report
              uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
              with: 
                path: coverage.out
                name: coverage-report-${{matrix.version}}
            - name: Display coverage report
              run: go tool cover -func=coverage.out
    lint:
      name: Lint for target ${{ matrix.target }}
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        max-parallel: 30
        matrix:
          target: [linux-amd64, windows-amd64, darwin-arm64, aix-ppc64, solaris-amd64]
      steps:
          - name: Checkout Code
            uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
          - name: Setup Go
            uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
            with:
              go-version: 'stable'
          - name: Set target platform
            run: | 
              {
                echo "GOOS=$(echo ${{ matrix.target }} | cut -d - -f1)" 
                echo "GOARCH=$(echo ${{ matrix.target }} | cut -d - -f2)"
              } >> "$GITHUB_ENV"
          - name: Run Linter
            uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
